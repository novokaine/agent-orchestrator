services:
  # Local LLM Server
  ollama:
    image: ollama/ollama:latest
    container_name: agent-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama/models:/root/.ollama/models
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=2
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    command: serve
    networks:
      - agent-network

  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: agent-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
      MONGO_INITDB_DATABASE: admin
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
    command: mongod --auth --bind_ip_all
    networks:
      - agent-network
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@localhost:27017/admin",
          "--eval",
          "db.adminCommand('ping')"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for WebSocket state & caching
  redis:
    image: redis:7.2-alpine
    container_name: agent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Agent Orchestrator (Python FastAPI + LangGraph)
  agent-orchestrator:
    build: ./agent-orchestrator
    container_name: agent-orchestrator
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - MONGODB_URL=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@mongodb:27017/agent_factory?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MODEL_NAME=${LLM_MODEL:-llama3.1:70b-instruct-q4_K_M}
      - AGENT_LOG_LEVEL=${AGENT_LOG_LEVEL:-INFO}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./projects:/app/projects
      - ./agent-orchestrator/app:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - agent-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Code Sandbox
  sandbox:
    image: docker:24-dind
    container_name: agent-sandbox
    restart: unless-stopped
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=
    volumes:
      - ./projects:/projects
      - sandbox_data:/var/lib/docker
    networks:
      - agent-network
    command: dockerd --host=tcp://0.0.0.0:2375 --host=unix:///var/run/docker.sock

  # Browser UI (React)
  frontend-ui:
    build: ./frontend-ui
    container_name: agent-ui
    restart: unless-stopped
    ports:
      - "3000:80"
      - "3001:3001"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:3001
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - agent-orchestrator
    networks:
      - agent-network

  # Nginx Reverse Proxy (optional - for production)
  nginx:
    image: nginx:alpine
    container_name: agent-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend-ui
      - agent-orchestrator
    networks:
      - agent-network
    profiles:
      - production

networks:
  agent-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  ollama_data:
    driver: local
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  sandbox_data:
    driver: local
